<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ff0066">
    <title>NSFW Image Searcher</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icons/icon-192.png">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        body {
            font-family: 'Inter', Arial, sans-serif;
            background: #0f0f0f;
            color: #eee;
            margin: 0;
            padding: 20px;
            line-height: 1.5;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        h1 {
            margin: 0;
            font-size: 2.2em;
            background: linear-gradient(90deg, #ff0066, #ff6600);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        input, button {
            padding: 14px 18px;
            font-size: 1.1em;
            border-radius: 8px;
            margin: 8px 4px;
        }
        #search {
            width: 65%;
            max-width: 520px;
            background: #1f1f1f;
            border: 2px solid #444;
            color: white;
        }
        button {
            background: #ff0066;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }
        button:hover {
            background: #ff3388;
        }
        .results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 18px;
            margin-top: 30px;
        }
        .image-card {
            border: 1px solid #333;
            border-radius: 12px;
            overflow: hidden;
            background: #1a1a1a;
            transition: transform 0.2s;
        }
        .image-card:hover {
            transform: scale(1.03);
        }
        .image-card img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            display: block;
        }
        .info {
            padding: 12px;
            font-size: 0.95em;
        }
        .warning {
            background: #330000;
            border: 1px solid #ff0066;
            color: #ff9999;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin: 20px 0;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <header>
        <h1>🔥 NSFW Image Searcher</h1>
        <p>Buscador de imágenes adultas desde Reddit</p>
    </header>

    <div class="warning">
        ⚠️ CONTENIDO +18 SOLO • USO BAJO TU RESPONSABILIDAD
    </div>

    <div style="text-align: center;">
        <input type="text" id="search" placeholder="Ej: waifu, hentai, ass, milf..." />
        <button onclick="searchImages()">🔍 Buscar</button>
        <button onclick="randomSearch()">🎲 Sorpresa</button>
    </div>

    <div id="results" class="results"></div>

    <script>
        const resultsDiv = document.getElementById('results');

        async function searchImages(query = null) {
            const input = document.getElementById('search');
            const q = (query || input.value.trim()).toLowerCase();
            if (!q) return alert('Escribe un término de búsqueda');

            resultsDiv.innerHTML = '<p style="text-align:center; grid-column:1/-1;">Buscando imágenes...</p>';

            try {
                const url = `https://www.reddit.com/search.json?q=${encodeURIComponent(q)}&sort=relevance&t=month&limit=60&include_over_18=on&raw_json=1`;
                
                const res = await fetch(url, {
                    headers: { 'User-Agent': 'NSFW-Image-Searcher/1.0 (PWA)' }
                });

                const data = await res.json();
                const posts = data.data.children || [];

                resultsDiv.innerHTML = '';

                const imagePosts = posts.filter(p => {
                    const u = p.data.url || '';
                    return u.match(/\.(jpg|jpeg|png|gif)$/i) || u.includes('i.redd.it') || u.includes('imgur');
                });

                if (imagePosts.length === 0) {
                    resultsDiv.innerHTML = `<p style="text-align:center; grid-column:1/-1;">No se encontraron imágenes para "${q}". Prueba otros términos.</p>`;
                    return;
                }

                imagePosts.forEach(post => {
                    const d = post.data;
                    const card = document.createElement('div');
                    card.className = 'image-card';
                    card.innerHTML = `
                        <img src="\( {d.url}" alt=" \){d.title}" loading="lazy" 
                             onclick="window.open('${d.url}', '_blank')">
                        <div class="info">
                            <strong>\( {d.title.substring(0, 55)} \){d.title.length > 55 ? '...' : ''}</strong><br>
                            <small>r/${d.subreddit} • ${d.score.toLocaleString()} upvotes</small>
                        </div>
                    `;
                    resultsDiv.appendChild(card);
                });
            } catch (err) {
                resultsDiv.innerHTML = `<p style="text-align:center; color:#ff6666; grid-column:1/-1;">Error al conectar con Reddit. Inténtalo de nuevo.</p>`;
            }
        }

        function randomSearch() {
            const terms = ['waifu', 'hentai', 'ass', 'boobs', 'thicc', 'milf', 'lewd', 'ecchi', 'ahegao', 'cosplay'];
            const randomTerm = terms[Math.floor(Math.random() * terms.length)];
            document.getElementById('search').value = randomTerm;
            searchImages(randomTerm);
        }

        // Buscar con Enter
        document.getElementById('search').addEventListener('keypress', e => {
            if (e.key === 'Enter') searchImages();
        });

        // Registrar Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
